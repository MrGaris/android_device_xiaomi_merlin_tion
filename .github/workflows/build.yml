name: TionOS Recovery Build (Android 12 S)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout Tree
      uses: actions/checkout@v4

    - name: Cleanup Space
      run: |
        sudo rm -rf /usr/share/dotnet /etc/mysql /usr/local/lib/android /opt/ghc
        sudo apt-get clean

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential zip curl libstdc++6 git wget python3 gcc clang libssl-dev rsync
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo

    - name: Setup Repo & Sync Source
      run: |
        export PATH="$HOME/bin:$PATH"
        mkdir ~/twrp && cd ~/twrp
        git config --global user.email "standoffplay94@gmail.com"
        git config --global user.name "MrGaris"
        
        repo init --no-clone-bundle -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1 --depth=1
        
        # КЛОНУЄМО В ПРАВИЛЬНУ ПАПКУ (merlinx), як того вимагає твій конфіг
        git clone https://github.com/MrGaris/android_device_xiaomi_merlin_tion.git device/xiaomi/merlinx
        git clone https://github.com/6768Team/android_device_xiaomi_mt6768-common.git device/xiaomi/mt6768-common
        git clone https://github.com/6768Team/android_vendor_xiaomi_merlinx.git vendor/xiaomi/merlinx
        
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Build TionOS Recovery
      run: |
        export PATH="$HOME/bin:$PATH"
        cd ~/twrp
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        
        # РОЗУМНИЙ ПОШУК: Скрипт сам знайде назву продукту в твоїх файлах
        PRODUCT=$(grep -h "PRODUCT_NAME" device/xiaomi/merlinx/*.mk | head -n 1 | awk '{print $3}')
        echo "Знайдено продукт: $PRODUCT"
        
        # Запускаємо збірку з правильною назвою
        lunch ${PRODUCT}-eng
        mka recoveryimage -j$(nproc --all)

    - name: Upload Result
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: TionOS-S-Recovery
        # Зірочка в шляху гарантує, що файл знайдеться в будь-якій папці
        path: ~/twrp/out/target/product/*/*.img
